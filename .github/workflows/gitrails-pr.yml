name: gitrails PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "gitrails/session-**"

jobs:
  gitrails-review:
    name: gitrails Security & Quality Review
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run gitrails review
        run: |
          echo "Review PR #${{ github.event.pull_request.number }} — scan for hardcoded secrets and OWASP vulnerabilities in the changed files." \
          | gitclaw --dir .
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_MODEL: groq:llama-3.3-70b-versatile
          GITRAILS_FALLBACK_MODEL: groq:llama-3.1-8b-instant
          GITRAILS_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITRAILS_REPO: ${{ github.repository }}
