name: gitrails PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "**"
    branches-ignore:
      - "gitrails/session-**"

jobs:
  gitrails-review:
    name: gitrails Security & Quality Review
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create session branch
        run: |
          SESSION_UUID=$(node -e "console.log(require('crypto').randomUUID().slice(0,8))")
          SESSION_BRANCH="gitrails/session-${SESSION_UUID}"
          echo "SESSION_BRANCH=${SESSION_BRANCH}" >> $GITHUB_ENV
          echo "SESSION_UUID=${SESSION_UUID}" >> $GITHUB_ENV
          git checkout -b "$SESSION_BRANCH"

      - name: Bootstrap gitrails
        run: bash hooks/scripts/bootstrap.sh
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_SESSION_ID: ${{ env.SESSION_UUID }}

      - name: Run gitrails review
        run: |
          npx gitclaw --dir . \
            --prompt "Review PR #${{ github.event.pull_request.number }} on branch ${{ github.head_ref }}" \
            --session-id "${{ env.SESSION_UUID }}"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_SESSION_ID: ${{ env.SESSION_UUID }}
          GITRAILS_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITRAILS_PR_BRANCH: ${{ github.head_ref }}
          GITRAILS_REPO: ${{ github.repository }}

      - name: Teardown
        if: always()
        run: |
          export GITRAILS_TEARDOWN_REASON="${{ job.status == 'success' && 'clean' || 'error' }}"
          bash hooks/scripts/teardown.sh
        env:
          GITRAILS_SESSION_ID: ${{ env.SESSION_UUID }}
