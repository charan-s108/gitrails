name: gitrails PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "gitrails/session-**"

jobs:
  gitrails-review:
    name: "gitrails — Security & Quality Review"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: "gitrails — Validate spec"
        run: |
          echo "## gitrails — PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Spec Validation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent validate 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent info 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "gitrails — Security & Quality Review"
        run: node scripts/pr-scan.js --pr ${{ github.event.pull_request.number }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_MODEL_HEAVY: groq:moonshotai/kimi-k2-instruct
          GITRAILS_MODEL_LIGHT: groq:llama-3.3-70b-versatile
          GITRAILS_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITRAILS_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
