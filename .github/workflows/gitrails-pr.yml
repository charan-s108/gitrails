name: gitrails PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "gitrails/session-**"

jobs:
  gitrails-review:
    name: "gitrails — Security & Quality Review"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: "gitrails — Validate spec"
        run: |
          echo "## gitrails — PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Spec Validation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent validate 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent info 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "Install expect (PTY driver for gitclaw)"
        run: sudo apt-get install -y expect -qq

      - name: "gitrails — Full agent scan"
        run: |
          echo "### Agent Scan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          expect -f - << 'EXPECT' 2>&1 | col -b | tee -a $GITHUB_STEP_SUMMARY
            log_user 1
            log_file -noappend /tmp/gitclaw-output.log
            set timeout 300
            set pr_num $env(PR_NUM)
            spawn npx gitclaw --dir .
            expect "→ "
            send "Review PR #$pr_num — scan for hardcoded secrets and OWASP vulnerabilities.\n"
            expect -timeout 300 "→ "
            send "/quit\n"
            expect eof
          EXPECT
          echo "--- full output ---"
          col -b < /tmp/gitclaw-output.log 2>/dev/null | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_MODEL: groq:moonshotai/kimi-k2-instruct
          GITRAILS_FALLBACK_MODEL: groq:llama-3.3-70b-versatile
          GITRAILS_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITRAILS_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
