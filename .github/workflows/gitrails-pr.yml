name: gitrails PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "gitrails/session-**"

jobs:
  gitrails-review:
    name: "gitrails ŌĆö Security & Quality Review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: "gitrails ŌĆö Validate spec"
        run: |
          echo "## gitrails ŌĆö PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref }}\` ŌåÆ \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Spec Validation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent validate 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx @open-gitagent/gitagent info 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "Create .env for gitclaw"
        run: |
          echo "GROQ_API_KEY=$GROQ_API_KEY" > .env
          echo "GITRAILS_MODEL=$GITRAILS_MODEL" >> .env
          echo "GITRAILS_FALLBACK_MODEL=$GITRAILS_FALLBACK_MODEL" >> .env
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITRAILS_MODEL: groq:moonshotai/kimi-k2-instruct
          GITRAILS_FALLBACK_MODEL: groq:llama-3.3-70b-versatile

      - name: "Verify Groq API reachable"
        run: |
          HTTP=$(curl -s -o /tmp/groq-test.json -w "%{http_code}" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":"reply ok"}],"max_tokens":3}' \
            https://api.groq.com/openai/v1/chat/completions)
          echo "Groq HTTP status: $HTTP"
          cat /tmp/groq-test.json
          [ "$HTTP" = "200" ] || { echo "Groq API unreachable or key invalid"; exit 1; }
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: "Install expect (PTY driver for gitclaw)"
        run: sudo apt-get install -y expect -qq

      - name: "gitrails ŌĆö Full agent scan"
        run: |
          echo "### Agent Scan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          expect -f - << 'EXPECT' 2>&1 \
            | perl -pe 's/\e\[[0-9;?]*[a-zA-Z]//g; s/\r\n?/\n/g' \
            | tee -a $GITHUB_STEP_SUMMARY
            log_user 1
            set timeout 120
            set pr_num $env(PR_NUM)
            spawn npx gitclaw --dir .
            expect "\033\[32m\342\206\222 "
            send "/review-pr\n"
            expect -timeout 480 "\033\[32m\342\206\222 "
            send "/quit\n"
            expect -timeout 30 eof
          EXPECT
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_MODEL: groq:moonshotai/kimi-k2-instruct
          GITRAILS_FALLBACK_MODEL: groq:llama-3.3-70b-versatile
          GITRAILS_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITRAILS_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
