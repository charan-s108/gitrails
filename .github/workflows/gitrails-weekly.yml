name: gitrails Weekly Audit

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: "Audit scope (full or incremental)"
        required: false
        default: "incremental"

jobs:
  weekly-audit:
    name: Weekly Security & Knowledge Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create session branch
        run: |
          SESSION_UUID=$(node -e "console.log(require('crypto').randomUUID().slice(0,8))")
          SESSION_BRANCH="gitrails/session-${SESSION_UUID}-weekly"
          echo "SESSION_BRANCH=${SESSION_BRANCH}" >> $GITHUB_ENV
          echo "SESSION_UUID=${SESSION_UUID}" >> $GITHUB_ENV
          git checkout -b "$SESSION_BRANCH"

      - name: Rebuild vector index and code graph
        run: |
          npm run index:build
          npm run graph:build
        env:
          GITRAILS_EMBEDDING_MODEL: Xenova/all-MiniLM-L6-v2

      - name: Run weekly gitrails audit
        # Uses the production scanner directly — bypasses gitclaw SDK to stay within
        # Groq free tier limits. Full scan mode: scans entire repo, no diff constraint.
        run: node scripts/pr-scan.js --full --target ./
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITRAILS_MODEL_HEAVY: ${{ vars.GITRAILS_MODEL_HEAVY || 'groq:llama-3.3-70b-versatile' }}
          GITRAILS_MODEL_LIGHT: ${{ vars.GITRAILS_MODEL_LIGHT || 'groq:llama-3.1-8b-instant' }}
          GITRAILS_SESSION_ID: ${{ env.SESSION_UUID }}
          GITRAILS_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Teardown
        if: always()
        run: |
          export GITRAILS_TEARDOWN_REASON="${{ job.status == 'success' && 'clean' || 'error' }}"
          bash hooks/scripts/teardown.sh
        env:
          GITRAILS_SESSION_ID: ${{ env.SESSION_UUID }}
