name: gitrails Spec Validation

on:
  push:
    paths:
      - "agent.yaml"
      - "agents/**/agent.yaml"
      - "agents/**/skills/**/SKILL.md"
      - "skills/**/SKILL.md"
      - "tools/*.yaml"
  pull_request:
    paths:
      - "agent.yaml"
      - "agents/**/agent.yaml"
      - "agents/**/skills/**/SKILL.md"
      - "skills/**/SKILL.md"
      - "tools/*.yaml"

jobs:
  validate:
    name: Validate gitagent spec v0.1.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run gitagent validate
        run: npm run validate

      - name: Run gitagent info
        run: npm run info

      - name: Verify all required files exist
        shell: bash
        run: |
          REQUIRED_FILES=(
            "agent.yaml" "SOUL.md" "RULES.md" "DUTIES.md" "AGENTS.md"
            "agents/mirror/agent.yaml" "agents/mirror/SOUL.md"
            "agents/sentinel/agent.yaml" "agents/sentinel/SOUL.md"
            "agents/reviewer/agent.yaml" "agents/reviewer/SOUL.md"
            "agents/scribe/agent.yaml" "agents/scribe/SOUL.md"
            "retrieval/index.js" "retrieval/graph.js" "retrieval/embedder.js"
            "knowledge/patterns.md" "knowledge/false-positives.md"
          )
          MISSING=()
          for f in "${REQUIRED_FILES[@]}"; do
            [ -f "$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Missing required files:"
            printf '  %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All required files present."
