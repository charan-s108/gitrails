name: pr-review
description: "Full PR review workflow — triage, parallel agent dispatch, synthesis, and post-session mirror audit."
version: 1.0.0

trigger:
  type: pr_opened_or_updated
  branches:
    - "*"
  exclude_branches:
    - "gitrails/session-*"

steps:
  - id: bootstrap
    type: hook
    script: hooks/scripts/bootstrap.sh
    description: "Load memory, verify vector index and code graph"

  - id: triage
    type: skill
    skill: triage
    agent: gitrails
    description: "Build scoped dispatch plan via semantic search"
    depends_on: [bootstrap]

  - id: dispatch
    type: skill
    skill: dispatch
    agent: gitrails
    description: "Invoke sentinel, reviewer, scribe in parallel"
    depends_on: [triage]
    parallel:
      - agent: sentinel
        skills: [scan-secrets, scan-vulnerabilities, scan-dependencies]
      - agent: reviewer
        skills: [review-diff, score-risk, suggest-tests]
      - agent: scribe
        skills: [generate-changelog, document-module]

  - id: synthesize
    type: skill
    skill: synthesize
    agent: gitrails
    description: "Merge findings, post PR comment, set GitHub Check"
    depends_on: [dispatch]

  - id: mirror-audit
    type: agent
    agent: mirror
    skills: [audit-decisions, propose-learning, contradiction-check]
    description: "Post-session self-audit and learning proposals"
    depends_on: [synthesize]

  - id: teardown
    type: hook
    script: hooks/scripts/teardown.sh
    description: "Clear runtime state"
    depends_on: [mirror-audit]
    run_on: [success, failure]

on_failure:
  - type: hook
    script: hooks/scripts/teardown.sh
    env:
      GITRAILS_TEARDOWN_REASON: error

outputs:
  - risk_score
  - verdict
  - pr_label
  - github_check_status
  - findings_count
