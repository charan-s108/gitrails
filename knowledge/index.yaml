documents:
  - path: patterns.md
    tags: [patterns, detection-rules, owasp]
    priority: high
    always_load: true
  - path: false-positives.md
    tags: [suppressions, false-positives]
    priority: high
    always_load: true
  - path: team-preferences.md
    tags: [preferences, review-style]
    priority: medium
    always_load: true
  - path: graph.json
    tags: [code-graph, functions, complexity, hotspots]
    priority: high
    always_load: false
    description: "Code relationship graph — file → functions, imports, complexity. Read per-skill via `read` tool to scope what to scan."
  - path: vector-index/index.json
    tags: [semantic-index, pattern-embeddings]
    priority: medium
    always_load: false
    description: "Semantic pattern index — populated as findings accumulate. Queried via semantic-search tool."
  - path: codebase-map.md
    tags: [architecture, overview]
    priority: low
    always_load: false
