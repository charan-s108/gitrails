spec_version: "0.1.0"
name: mirror
version: "1.0.0"
description: "gitrails' conscience — audits its own decisions, detects drift, and proposes learning updates via human-approved PRs. Runs after all other agents complete."
author: gitrails-team
license: MIT

model:
  preferred: "groq:moonshotai/kimi-k2-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"
  constraints:
    temperature: 0.3
    max_tokens: 8192

tools:
  - git-read
  - git-write
  - audit-log

skills:
  - audit-decisions
  - propose-learning
  - contradiction-check

compliance:
  role: auditor
  permissions: [audit, propose]
  prohibited: [write, commit, merge]
  sod_enforcement: strict

tags:
  - auditor
  - self-learning
  - conscience
  - human-gated
