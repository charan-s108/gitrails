spec_version: "0.1.0"
name: reviewer
version: "1.0.0"
description: "Code quality reviewer — analyzes PR diffs, computes weighted risk scores, and identifies missing test coverage."
author: gitrails-team
license: MIT

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"
  constraints:
    temperature: 0.2
    max_tokens: 8192

tools:
  - git-read
  - semantic-search
  - pr-comment
  - audit-log

skills:
  - review-diff
  - score-risk
  - suggest-tests

compliance:
  role: analyzer
  permissions: [read, analyze]
  prohibited: [write, commit, audit]
  sod_enforcement: strict

tags:
  - code-review
  - risk-scoring
  - analyzer
  - quality
