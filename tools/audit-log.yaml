name: audit-log
description: "Append a structured JSON entry to the immutable audit log at .gitagent/audit.jsonl. Every tool call, finding, and decision must be logged."
version: 1.0.0
input_schema:
  type: object
  properties:
    event_type:
      type: string
      enum: [tool_call, finding, decision, session_start, session_end, error, escalation]
      description: "Type of audit event"
    agent:
      type: string
      description: "Agent name generating this log entry"
    skill:
      type: string
      description: "Skill name if applicable"
    finding_id:
      type: string
      description: "Finding ID if this is a finding event"
    severity:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW, INFO]
    payload:
      type: object
      description: "Event-specific data (tool args, finding details, decision rationale)"
    session_id:
      type: string
      description: "Session UUID for correlation"
  required: [event_type, agent, payload, session_id]
output_schema:
  type: object
  properties:
    logged:
      type: boolean
    timestamp:
      type: string
      description: "ISO 8601 timestamp of log entry"
    entry_id:
      type: string
annotations:
  requires_confirmation: false
  read_only: false
  cost: low
implementation:
  type: script
  path: hooks/scripts/pre-tool-audit.sh
  runtime: bash
  timeout: 5
